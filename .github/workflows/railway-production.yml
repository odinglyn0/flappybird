name: Railway Production Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  RAILWAY_CLI_IMAGE: ghcr.io/railwayapp/cli:5.23.3
  RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE || 'flappybird' }}
  RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT || 'production' }}

jobs:
  deploy:
    name: Deploy main to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli

      - name: Deploy to production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}
        run: |
          docker run --rm \
            -e RAILWAY_TOKEN \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$RAILWAY_CLI_IMAGE" \
            railway up --ci --service "$RAILWAY_SERVICE" --environment "$RAILWAY_ENVIRONMENT"
