# SPDX-License-Identifier: WTFPL
name: CI
on:
  push:
    branches: [main, work]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true
      - run: npm install
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
