name: Railway PR Environment

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  pull-requests: write

env:
  RAILWAY_CLI_IMAGE: ghcr.io/railwayapp/cli:5.23.3
  RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE || 'flappybird' }}
  RAILWAY_BASE_ENVIRONMENT: ${{ vars.RAILWAY_PR_BASE_ENVIRONMENT || 'production' }}
  RAILWAY_PR_ENVIRONMENT: pr-${{ github.event.pull_request.number }}

jobs:
  deploy-preview:
    name: Deploy PR preview to Railway
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli

      - name: Link Railway project
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          docker run --rm \
            -e RAILWAY_API_TOKEN \
            -v "$RUNNER_TEMP/railway:/root/.railway" \
            "$RAILWAY_CLI_IMAGE" \
            railway link --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_BASE_ENVIRONMENT" --service "$RAILWAY_SERVICE"

      - name: Ensure Railway PR environment exists
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway() {
            docker run --rm \
              -e RAILWAY_API_TOKEN \
              -v "$RUNNER_TEMP/railway:/root/.railway" \
              "$RAILWAY_CLI_IMAGE" \
              railway "$@"
          }

          if ! railway environment list --json | jq -e --arg name "$RAILWAY_PR_ENVIRONMENT" '.[] | select(.name == $name)' > /dev/null; then
            railway environment new "$RAILWAY_PR_ENVIRONMENT" \
              --duplicate "$RAILWAY_BASE_ENVIRONMENT"
          fi

      - name: Deploy PR environment
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          docker run --rm \
            -e RAILWAY_API_TOKEN \
            -v "$PWD:/workspace" \
            -v "$RUNNER_TEMP/railway:/root/.railway" \
            -w /workspace \
            "$RAILWAY_CLI_IMAGE" \
            railway up --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_PR_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE"

      - name: Ensure Railway preview domain exists
        id: domain
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          set +e
          railway() {
            docker run --rm \
              -e RAILWAY_API_TOKEN \
              -v "$RUNNER_TEMP/railway:/root/.railway" \
              "$RAILWAY_CLI_IMAGE" \
              railway "$@"
          }

          output=$(railway domain \
            --environment "$RAILWAY_PR_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE" \
            --json 2>/dev/null)
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            url=$(echo "$output" | jq -r '.domain // .url // .[0].domain // .[0].url // empty')
            if [ -n "$url" ]; then
              case "$url" in
                http*) echo "url=$url" >> "$GITHUB_OUTPUT" ;;
                *) echo "url=https://$url" >> "$GITHUB_OUTPUT" ;;
              esac
            fi
          fi

      - name: Comment with Railway environment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.domain.outputs.url }}
        with:
          script: |
            const marker = '<!-- railway-pr-environment -->';
            const url = process.env.PREVIEW_URL;
            const body = `${marker}\n🚂 Railway preview environment \`${process.env.RAILWAY_PR_ENVIRONMENT}\` has been deployed.${url ? `\n\nPreview URL: ${url}` : ''}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  cleanup-preview:
    name: Delete Railway PR environment
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli

      - name: Link Railway project
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          docker run --rm \
            -e RAILWAY_API_TOKEN \
            -v "$RUNNER_TEMP/railway:/root/.railway" \
            "$RAILWAY_CLI_IMAGE" \
            railway link --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_BASE_ENVIRONMENT" --service "$RAILWAY_SERVICE"

      - name: Delete Railway PR environment
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway() {
            docker run --rm \
              -e RAILWAY_API_TOKEN \
              -v "$RUNNER_TEMP/railway:/root/.railway" \
              "$RAILWAY_CLI_IMAGE" \
              railway "$@"
          }

          if railway environment list --json | jq -e --arg name "$RAILWAY_PR_ENVIRONMENT" '.[] | select(.name == $name)' > /dev/null; then
            railway environment delete "$RAILWAY_PR_ENVIRONMENT" \
              --yes
          fi
